<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数智教材平台 - 软件工程 第3版</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  body { overflow: hidden; }
  .reader-layout {
    display: grid;
    grid-template-columns: 240px 1fr 340px;
    height: calc(100vh - 48px);
    overflow: hidden;
  }

  /* 左栏：目录树 */
  .toc-panel {
    background: #F8F9FA; border-right: 1px solid var(--border-soft);
    overflow-y: auto; display: flex; flex-direction: column;
  }
  .toc-head {
    padding: 12px 16px; border-bottom: 1px solid var(--border-soft);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface); position: sticky; top: 0; z-index: 5;
  }
  .toc-head .book-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .toc-head .book-meta { font-size: 11px; color: var(--text-muted); }
  .toc-search {
    padding: 8px 12px; border-bottom: 1px solid var(--border-soft); background: var(--surface);
  }
  .toc-search input {
    width: 100%; padding: 6px 10px; border: 1px solid var(--border-soft);
    border-radius: 6px; font-size: 12px; outline: none; background: var(--bg-soft);
  }
  .toc-search input:focus { border-color: var(--primary); background: #fff; }
  .toc-tree { padding: 8px 0; flex: 1; overflow-y: auto; }
  .toc-chapter {
    margin-bottom: 2px;
  }
  .toc-chapter-head {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 12px; font-size: 13px; font-weight: 500; color: var(--text);
    cursor: pointer; transition: .12s;
  }
  .toc-chapter-head:hover { background: var(--bg-hover); }
  .toc-chapter-head.active { background: var(--primary-light); color: var(--primary); }
  .toc-chapter-head .toggle { width: 14px; font-size: 10px; color: var(--text-faint); transition: .15s; text-align: center; }
  .toc-chapter-head.open .toggle { transform: rotate(90deg); }
  .toc-chapter-head .num { color: var(--text-muted); font-size: 12px; }
  .toc-section {
    display: flex; align-items: center; gap: 4px;
    padding: 5px 12px 5px 32px; font-size: 12.5px; color: var(--text-soft);
    cursor: pointer; transition: .12s;
  }
  .toc-section:hover { background: var(--bg-hover); color: var(--text); }
  .toc-section.active { background: var(--primary-light); color: var(--primary); font-weight: 500; }
  .toc-section .def-mark { font-size: 10px; color: var(--warning); }
  .toc-section .page-num { font-size: 10px; color: var(--text-faint); margin-left: auto; }
  .toc-extra {
    padding: 6px 12px; font-size: 12.5px; color: var(--text-soft); cursor: pointer;
    transition: .12s; display: flex; align-items: center; gap: 6px;
  }
  .toc-extra:hover { background: var(--bg-hover); }

  /* 中栏：原文阅读 */
  .content-panel {
    background: var(--surface); display: flex; flex-direction: column; overflow: hidden;
  }
  .content-toolbar {
    height: 40px; padding: 0 16px; border-bottom: 1px solid var(--border-soft);
    display: flex; align-items: center; gap: 12px; background: var(--surface-2);
    flex-shrink: 0;
  }
  .content-toolbar .chapter-label { font-size: 13px; color: var(--text-soft); flex: 1; }
  .content-toolbar .page-nav { display: flex; align-items: center; gap: 6px; }
  .content-toolbar .page-nav button {
    width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border-soft);
    background: var(--surface); display: grid; place-items: center; cursor: pointer; transition: .12s;
  }
  .content-toolbar .page-nav button:hover { background: var(--bg-hover); }
  .content-toolbar .page-nav input {
    width: 44px; text-align: center; border: 1px solid var(--border-soft);
    border-radius: 6px; padding: 3px; font-size: 12px;
  }
  .content-toolbar .hl-toggle {
    display: flex; align-items: center; gap: 6px; font-size: 12px;
    color: var(--text-muted); cursor: pointer; user-select: none;
  }
  .content-toolbar .hl-toggle .switch {
    width: 28px; height: 16px; border-radius: 8px; background: var(--border);
    position: relative; transition: .2s;
  }
  .content-toolbar .hl-toggle .switch::after {
    content: ''; position: absolute; left: 2px; top: 2px;
    width: 12px; height: 12px; border-radius: 50%; background: #fff; transition: .2s;
  }
  .content-toolbar .hl-toggle.on .switch { background: var(--primary); }
  .content-toolbar .hl-toggle.on .switch::after { left: 14px; }
  .content-toolbar .action-btn {
    padding: 5px 12px; border-radius: 6px; font-size: 12px;
    border: 1px solid var(--border-soft); background: var(--surface);
    color: var(--text-soft); cursor: pointer; transition: .12s;
    display: flex; align-items: center; gap: 4px;
  }
  .content-toolbar .action-btn:hover { background: var(--bg-hover); }
  .content-toolbar .action-btn.primary {
    background: var(--primary); color: #fff; border-color: var(--primary);
  }
  .content-toolbar .action-btn.primary:hover { background: var(--primary-dark); }

  .content-body {
    flex: 1; overflow-y: auto; padding: 32px 48px;
    font-size: 15px; line-height: 2; color: var(--text);
    font-family: "PingFang SC", "Noto Serif SC", "Source Han Serif", serif;
  }
  .content-body .page-header {
    font-size: 13px; color: var(--text-muted); margin-bottom: 20px;
    padding-bottom: 10px; border-bottom: 1px solid var(--border-soft);
  }
  .content-body .kw {
    background: var(--warning-light); color: var(--warning);
    padding: 1px 4px; border-radius: 3px; cursor: pointer; transition: .12s;
    font-weight: 500; position: relative;
  }
  .content-body .kw:hover { background: var(--warning); color: #fff; }
  .content-body .kw.has-def { background: var(--primary-light); color: var(--primary); }
  .content-body .kw.has-def:hover { background: var(--primary); color: #fff; }
  .content-body .kw.has-video::after { content: '🎬'; font-size: 10px; margin-left: 2px; }
  .content-body .formula { text-align: center; margin: 12px 0; font-style: italic; color: var(--text-soft); }
  .content-body .fig-caption { text-align: center; font-size: 13px; color: var(--text-muted); margin: 8px 0 20px; }

  /* 右栏 */
  .info-panel {
    background: var(--surface-2); border-left: 1px solid var(--border-soft);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .info-tabs {
    display: flex; border-bottom: 1px solid var(--border-soft); background: var(--surface);
    flex-shrink: 0;
  }
  .info-tab {
    flex: 1; padding: 10px 4px; text-align: center; font-size: 12px;
    color: var(--text-muted); cursor: pointer; transition: .12s;
    border-bottom: 2px solid transparent;
  }
  .info-tab:hover { color: var(--text); }
  .info-tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 500; }
  .info-body { flex: 1; overflow-y: auto; padding: 16px; }
  .info-section { margin-bottom: 18px; }
  .info-section .label {
    font-size: 11px; font-weight: 600; color: var(--text-muted);
    letter-spacing: .5px; margin-bottom: 8px;
  }

  /* 教材信息 */
  .book-info-card { background: var(--surface); border-radius: 10px; padding: 14px; margin-bottom: 12px; }
  .book-info-card .row { display: flex; margin-bottom: 6px; font-size: 12px; }
  .book-info-card .row .k { width: 60px; color: var(--text-muted); flex-shrink: 0; }
  .book-info-card .row .v { color: var(--text-soft); flex: 1; }
  .book-info-card .intro { font-size: 12px; color: var(--text-soft); line-height: 1.6; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border-soft); }

  /* 外部资源 */
  .ext-group { margin-bottom: 16px; }
  .ext-group .head {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 600; color: var(--text);
    padding: 6px 0; margin-bottom: 6px;
  }
  .ext-group .head .ico { font-size: 14px; }
  .ext-group .head .count {
    font-size: 10px; padding: 1px 6px; border-radius: 8px;
    background: var(--bg-hover); color: var(--text-muted);
  }
  .ext-item {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 8px 10px; border-radius: 8px; transition: .12s; cursor: pointer;
    margin-bottom: 4px; border: 1px solid transparent;
  }
  .ext-item:hover { background: var(--surface); border-color: var(--border-soft); }
  .ext-item .ico { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .ext-item .body { flex: 1; min-width: 0; }
  .ext-item .body .title {
    font-size: 12px; color: var(--text); line-height: 1.4;
    overflow: hidden; text-overflow: ellipsis; display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  }
  .ext-item .body .meta {
    font-size: 10px; color: var(--text-muted); margin-top: 2px;
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .ext-item .body .meta .tag { padding: 0 4px; border-radius: 3px; }
  .ext-item .body .meta .tag.bili { background: #FCE8E6; color: #C5221F; }
  .ext-item .body .meta .tag.gh { background: #E6F4EA; color: #188038; }
  .ext-item .body .meta .tag.arxiv { background: #F3E8FD; color: #A142F4; }
  .ext-item .body .meta .tag.blog { background: #FEF7E0; color: #B06000; }
  .ext-item .body .meta .tag.slide { background: #E8F0FE; color: #1A73E8; }

  /* 智能问答 */
  .qa-area { display: flex; flex-direction: column; height: 100%; }
  .qa-messages { flex: 1; overflow-y: auto; margin-bottom: 12px; }
  .qa-msg { margin-bottom: 12px; }
  .qa-msg.user .bubble {
    background: var(--primary); color: #fff;
    padding: 8px 12px; border-radius: 12px 12px 4px 12px;
    font-size: 13px; display: inline-block; max-width: 90%; margin-left: auto;
  }
  .qa-msg.ai .bubble {
    background: var(--surface); border: 1px solid var(--border-soft);
    padding: 10px 12px; border-radius: 12px 12px 12px 4px;
    font-size: 13px; line-height: 1.6; color: var(--text-soft);
  }
  .qa-suggestions { margin-bottom: 12px; }
  .qa-sugg {
    display: block; padding: 8px 10px; border-radius: 8px;
    background: var(--surface); border: 1px solid var(--border-soft);
    font-size: 12px; color: var(--text-soft); cursor: pointer;
    transition: .12s; margin-bottom: 4px;
  }
  .qa-sugg:hover { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }
  .qa-input { display: flex; gap: 6px; }
  .qa-input input {
    flex: 1; padding: 8px 12px; border: 1px solid var(--border-soft);
    border-radius: 8px; font-size: 12px; outline: none; background: var(--surface);
  }
  .qa-input input:focus { border-color: var(--primary); }
  .qa-input button {
    padding: 8px 14px; border-radius: 8px; background: var(--primary);
    color: #fff; border: none; font-size: 12px; cursor: pointer;
  }

  /* 关键词弹窗 */
  .kw-popup {
    position: fixed; z-index: 200; width: 300px;
    background: var(--surface); border: 1px solid var(--border-soft);
    border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,.15);
    display: none; overflow: hidden;
  }
  .kw-popup.show { display: block; animation: fadeUp .15s; }
  .kw-popup .head {
    padding: 10px 14px; background: var(--primary-light);
    display: flex; align-items: center; justify-content: space-between;
  }
  .kw-popup .head .term { font-size: 14px; font-weight: 600; color: var(--primary); }
  .kw-popup .head .close { cursor: pointer; color: var(--text-muted); }
  .kw-popup .body { padding: 12px 14px; max-height: 280px; overflow-y: auto; }
  .kw-popup .section { margin-bottom: 12px; }
  .kw-popup .section .label {
    font-size: 10px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; margin-bottom: 4px;
  }
  .kw-popup .def-box {
    background: var(--primary-light); border-radius: 8px;
    padding: 8px 10px; font-size: 12px; color: var(--text); line-height: 1.5;
  }
  .kw-popup .def-source { font-size: 10px; color: var(--primary); margin-top: 4px; }
  .kw-popup .occ-item {
    font-size: 11px; color: var(--text-muted); padding: 3px 0;
    cursor: pointer; transition: .12s;
  }
  .kw-popup .occ-item:hover { color: var(--primary); }
  .kw-popup .actions {
    padding: 8px 14px; border-top: 1px solid var(--border-soft);
    display: flex; gap: 6px; background: var(--surface-2);
  }
  .kw-popup .actions button {
    font-size: 11px; padding: 4px 10px; border-radius: 6px;
    color: var(--primary); background: transparent; cursor: pointer; border: none;
  }
  .kw-popup .actions button:hover { background: var(--primary-light); }

  /* PPT模态框 */
  .ppt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
</style>
</head>
<body>

<!-- 顶部栏 -->
<div class="topbar" style="height:48px">
  <div class="logo" style="font-size:14px">
    <div class="mark" style="width:28px;height:28px;font-size:13px">数</div>
    <span>数智教材平台</span>
    <span style="color:var(--text-muted);font-size:12px;margin-left:8px">《软件工程 第3版》</span>
  </div>
  <div class="spacer"></div>
  <div class="tools" style="gap:6px">
    <button class="action-btn" onclick="showToast('📚 教材库开发中')">📚 教材库</button>
    <button class="action-btn primary" onclick="generatePPT()">📊 生成课件</button>
    <button class="action-btn" onclick="generateLessonPlan()">📝 生成教案</button>
    <div class="user" style="margin-left:8px">
      <div class="avatar" style="width:26px;height:26px;font-size:11px">王</div>
      <span class="name" style="font-size:12px">欢迎：王老师</span>
    </div>
  </div>
</div>

<!-- 三栏布局 -->
<div class="reader-layout">
  <!-- 左栏：目录 -->
  <div class="toc-panel">
    <div class="toc-head">
      <div>
        <div class="book-title">软件工程 第3版</div>
        <div class="book-meta">钱乐秋 等 · 清华大学出版社</div>
      </div>
    </div>
    <div class="toc-search">
      <input type="text" placeholder="搜索章节..." id="toc-search">
    </div>
    <div class="toc-tree" id="toc-tree"></div>
  </div>

  <!-- 中栏：原文 -->
  <div class="content-panel">
    <div class="content-toolbar">
      <div class="chapter-label" id="chapter-label">第1章 概论</div>
      <div class="page-nav">
        <button onclick="prevPage()">‹</button>
        <input type="number" id="page-input" value="14" min="1" max="398" onchange="goToPage(this.value)">
        <span style="font-size:11px;color:var(--text-muted)">/ 398</span>
        <button onclick="nextPage()">›</button>
      </div>
      <div class="hl-toggle on" id="hl-toggle" onclick="toggleHighlight(this)">
        <span>关键词</span>
        <div class="switch"></div>
      </div>
      <button class="action-btn" onclick="showCitationPanel()">📜 引经据典</button>
    </div>
    <div class="content-body" id="content-body">加载中...</div>
  </div>

  <!-- 右栏：关联详情(动态) / 信息 / 书中图片 / 外部资源 / 概念图谱 / 智能问答 -->
  <div class="info-panel">
    <div class="info-tabs">
      <div class="info-tab active" onclick="switchTab('detail',this)">关联详情</div>
      <div class="info-tab" onclick="switchTab('info',this)">信息</div>
      <div class="info-tab" onclick="switchTab('images',this)">书中图片</div>
      <div class="info-tab" onclick="switchTab('resources',this)">外部资源</div>
      <div class="info-tab" onclick="switchTab('graph',this)">概念图谱</div>
      <div class="info-tab" onclick="switchTab('qa',this)">智能问答</div>
    </div>
    <div class="info-body" id="info-body">
      <!-- Tab内容动态渲染 -->
    </div>
  </div>
</div>

<!-- PPT模态框 -->
<div class="modal-overlay" id="ppt-modal">
  <div class="modal" style="max-width:900px">
    <div class="head"><h2>📊 课件预览</h2><button class="btn-icon" onclick="closeModal('ppt-modal')">✕</button></div>
    <div class="body"><div class="ppt-grid" id="ppt-slides"></div></div>
    <div class="foot">
      <button class="btn btn-ghost" onclick="closeModal('ppt-modal')">关闭</button>
      <button class="btn btn-primary" onclick="downloadPPT()">⬇ 下载 .pptx</button>
    </div>
  </div>
</div>

<!-- 教案模态框 -->
<div class="modal-overlay" id="lesson-modal">
  <div class="modal" style="max-width:700px">
    <div class="head"><h2>📝 教案预览</h2><button class="btn-icon" onclick="closeModal('lesson-modal')">✕</button></div>
    <div class="body" id="lesson-body" style="max-height:65vh;overflow-y:auto;padding:24px 32px"></div>
    <div class="foot">
      <button class="btn btn-ghost" onclick="closeModal('lesson-modal')">关闭</button>
      <button class="btn btn-primary" onclick="downloadLesson()">⬇ 下载 .txt</button>
      <button class="btn btn-primary" onclick="printLesson()">🖨 打印</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let fulltext=null, knowledge=null, kwIndex=null, extRes=null, images=null, defs=null, graph=null;
let currentPage = 14;
let currentChapter = 1;
let highlightOn = true;
let activeKwData = null;
let pptSlides = [];
let currentTab = 'info';

// ===== 加载数据 =====
async function loadData() {
  const [f,k,ki,e,img,d,g] = await Promise.all([
    fetch('data/se_fulltext.json').then(r=>r.json()),
    fetch('data/se_knowledge.json').then(r=>r.json()),
    fetch('data/se_keyword_index.json').then(r=>r.json()),
    fetch('data/se_external_resources.json').then(r=>r.json()),
    fetch('data/se_images.json').then(r=>r.json()),
    fetch('data/se_definitions.json').then(r=>r.json()),
    fetch('data/se_concept_graph.json').then(r=>r.json())
  ]);
  fulltext=f; knowledge=k; kwIndex=ki; extRes=e; images=img; defs=d; graph=g;
  // 初始化PDF.js
  if(window.pdfjsLib) {
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }
  renderToc();
  goToPage(14);
  switchTab('detail', document.querySelector('.info-tab'));
  renderDetailEmpty();
}

// ===== 左栏：目录树 =====
function renderToc() {
  const tree = document.getElementById('toc-tree');
  let html = '';
  knowledge.chapters.forEach(ch => {
    const secs = knowledge.sections.filter(s => s.chapter === ch.num);
    html += `<div class="toc-chapter" id="ch-${ch.num}">`;
    html += `<div class="toc-chapter-head ${ch.num===1?'open':''}" onclick="toggleChapter(${ch.num})" id="ch-head-${ch.num}">`;
    html += `<span class="toggle">▶</span>`;
    html += `<span class="num">第${ch.num}章</span>`;
    html += `<span>${ch.title}</span>`;
    html += `</div>`;
    html += `<div class="toc-sections" id="ch-secs-${ch.num}" style="${ch.num===1?'':'display:none'}">`;
    secs.forEach(sec => {
      const hasDef = sec.definitions.length > 0;
      html += `<div class="toc-section" onclick="goToPage(${sec.page_start});selectSection(this)" data-page="${sec.page_start}">`;
      html += `<span>${sec.section} ${sec.section_title}</span>`;
      if(hasDef) html += `<span class="def-mark">📜</span>`;
      html += `<span class="page-num">p${sec.page_start}</span>`;
      html += `</div>`;
    });
    html += `</div></div>`;
  });
  // 本章小结、思考题、参考文献
  html += `<div class="toc-extra" onclick="goToPage(330)"><span>📝</span> 本章小结</div>`;
  html += `<div class="toc-extra" onclick="goToPage(332)"><span>💡</span> 思考题</div>`;
  html += `<div class="toc-extra" onclick="goToPage(334)"><span>📚</span> 参考文献</div>`;
  tree.innerHTML = html;
}

function toggleChapter(num) {
  const head = document.getElementById('ch-head-'+num);
  const secs = document.getElementById('ch-secs-'+num);
  head.classList.toggle('open');
  secs.style.display = head.classList.contains('open') ? 'block' : 'none';
  goToPage(knowledge.chapters.find(c=>c.num===num).page_start);
}

function selectSection(el) {
  document.querySelectorAll('.toc-section').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
}

// ===== 中栏：原文 =====
function getPageText(page) {
  const p = fulltext.pages.find(p => p.page === page);
  return p ? p.text : '';
}

function goToPage(page) {
  page = parseInt(page);
  if(isNaN(page)||page<1) page=1;
  if(page>398) page=398;
  currentPage = page;
  document.getElementById('page-input').value = page;

  const ch = knowledge.chapters.find(c => page>=c.page_start && page<=c.page_end);
  currentChapter = ch ? ch.num : 1;
  document.getElementById('chapter-label').textContent = ch ? `第${ch.num}章 ${ch.title} · 第${page}页` : `第${page}页`;

  // 高亮目录
  document.querySelectorAll('.toc-chapter-head').forEach(h => h.classList.remove('active'));
  document.getElementById('ch-head-'+currentChapter)?.classList.add('active');

  const text = getPageText(page);
  if(!text) {
    document.getElementById('content-body').innerHTML = '<div style="color:var(--text-muted);text-align:center;padding:40px">该页无内容</div>';
    return;
  }

  if(highlightOn) renderHighlighted(text, page);
  else document.getElementById('content-body').textContent = text;

  // 更新右栏
  if(currentTab === 'resources') renderResources();
  if(currentTab === 'info') renderInfo();
}

function renderHighlighted(text, page) {
  const annotations = kwIndex.page_terms[String(page)] || [];
  if(!annotations.length) {
    document.getElementById('content-body').textContent = text;
    return;
  }

  const sorted = [...annotations].sort((a,b) => a.pos - b.pos);
  // 去重叠
  const filtered = [];
  let lastEnd = 0;
  for(const ann of sorted) {
    if(ann.pos >= lastEnd) { filtered.push(ann); lastEnd = ann.pos + ann.length; }
  }

  let result = `<div class="page-header">— 第 ${page} 页 —</div>`;
  let lastPos = 0;
  for(const ann of filtered) {
    let before = text.substring(lastPos, ann.pos);
    before = before.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    result += before;
    const term = text.substring(ann.pos, ann.pos+ann.length);
    const cls = ann.has_def ? 'kw has-def' : 'kw';
    const vidCls = ann.has_video ? ' has-video' : '';
    const data = JSON.stringify({term,page,pos:ann.pos}).replace(/"/g,'&quot;');
    result += `<span class="${cls}${vidCls}" data-kw='${data}' onclick="showKwPopup(this,event)">${term}</span>`;
    lastPos = ann.pos + ann.length;
  }
  let after = text.substring(lastPos);
  after = after.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  result += after;
  document.getElementById('content-body').innerHTML = result;
}

function drawGraph(chGraph) {
  const svg = document.getElementById('graph-svg');
  if(!svg) return;
  const w = svg.clientWidth || 300, h = 320;
  const cx = w/2, cy = h/2;

  // 简单力导向布局（圆形排列）
  const concepts = chGraph.nodes.filter(n => n.type === 'concept');
  const sections = chGraph.nodes.filter(n => n.type === 'section');
  const R = Math.min(w, h) / 2 - 30;

  // 章节点在中心
  const positions = {};
  positions[`ch-${currentChapter}`] = {x: cx, y: cy};

  // 节节点围绕中心
  sections.forEach((s, i) => {
    const angle = (i / sections.length) * 2 * Math.PI;
    positions[s.id] = {x: cx + R*0.5*Math.cos(angle), y: cy + R*0.5*Math.sin(angle)};
  });

  // 概念节点在外圈
  concepts.forEach((c, i) => {
    const angle = (i / concepts.length) * 2 * Math.PI;
    positions[c.id] = {x: cx + R*Math.cos(angle), y: cy + R*Math.sin(angle)};
  });

  let html = '';
  // 画边
  chGraph.edges.forEach(e => {
    const s = positions[e.source], t = positions[e.target];
    if(!s || !t) return;
    if(e.type === 'hierarchy') {
      html += `<line x1="${s.x}" y1="${s.y}" x2="${t.x}" y2="${t.y}" stroke="#D1D5DB" stroke-width="1"/>`;
    } else {
      html += `<line x1="${s.x}" y1="${s.y}" x2="${t.x}" y2="${t.y}" stroke="#A78BFA" stroke-width="1" stroke-dasharray="2,2" opacity="0.4"/>`;
    }
  });
  // 画节点
  chGraph.nodes.forEach(n => {
    const p = positions[n.id];
    if(!p) return;
    if(n.type === 'chapter') {
      html += `<circle cx="${p.x}" cy="${p.y}" r="12" fill="#1A73E8" stroke="#fff" stroke-width="2"/>`;
      html += `<text x="${p.x}" y="${p.y+4}" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">${currentChapter}</text>`;
    } else if(n.type === 'section') {
      html += `<circle cx="${p.x}" cy="${p.y}" r="5" fill="#6B7280"/>`;
    } else {
      const color = n.has_def ? '#10B981' : '#9CA3AF';
      const r = n.has_def ? 7 : 5;
      html += `<circle cx="${p.x}" cy="${p.y}" r="${r}" fill="${color}" stroke="#fff" stroke-width="1.5" style="cursor:pointer" onclick="searchKw('${n.label}')"/>`;
      if(n.has_def) {
        html += `<text x="${p.x}" y="${p.y-10}" text-anchor="middle" fill="#374151" font-size="9">${n.label.substring(0,6)}</text>`;
      }
    }
  });
  svg.innerHTML = html;
}

function searchKw(term) {
  // 在全文中搜索该术语，跳转到第一次出现的位置
  const kw = kwIndex.keywords.find(k => k.term === term);

}

      <div class="qa-suggestions">
        ${sugg.map(s => `<div class="qa-sugg" onclick="askQuestion('${s}')">${s}</div>`).join('')}
      </div>
      <div class="qa-messages" id="qa-messages"></div>
      <div class="qa-input">
        <input type="text" id="qa-input" placeholder="基于教材内容提问..." onkeydown="if(event.key==='Enter')sendQA()">
        <button onclick="sendQA()">发送</button>
      </div>
    </div>
  `;
}

function askQuestion(q) {
  document.getElementById('qa-input').value = q;
  sendQA();
}

function sendQA() {
  const input = document.getElementById('qa-input');
  const q = input.value.trim();
  if(!q) return;
  const msgs = document.getElementById('qa-messages');
  msgs.innerHTML += `<div class="qa-msg user"><div class="bubble">${q}</div></div>`;
  input.value = '';

  // 模拟AI回答
  const ch = knowledge.chapters.find(c => c.num === currentChapter);
  const secs = knowledge.sections.filter(s => s.chapter === currentChapter);
  const kps = [];
  secs.forEach(sec => sec.definitions.forEach(d => kps.push(d)));

  let answer = '';
  if(q.includes('核心概念') || q.includes('重点')) {
    answer = `第${ch.num}章「${ch.title}」的核心知识点包括：\n`;
    secs.slice(0,5).forEach(sec => {
      answer += `• ${sec.section} ${sec.section_title}`;
      if(sec.definitions.length) answer += `（📜有定义）`;
      answer += '\n';
    });
  } else if(q.includes('引经据典') || q.includes('定义')) {
    answer = `本章可引经据典的定义：\n`;
    kps.slice(0,4).forEach(k => {
      answer += `「${k.term}」：${k.text.substring(0,50)}...\n`;
      if(k.source) answer += `  📖 出处：《${k.source}》第${k.def_page||k.page}页\n`;
    });
  } else if(q.includes('教学目标')) {
    answer = `第${ch.num}章教学目标：\n1. 知识目标：掌握${ch.title}的基本概念\n2. 能力目标：运用所学知识解决实际问题\n3. 素质目标：培养软件工程思维\n\n建议课时：2课时（90分钟）`;
  } else {
    const relevant = secs.find(s => q.includes(s.section_title)) || secs[0];
    if(relevant) answer = `${relevant.section} ${relevant.section_title}：\n${relevant.text_preview}\n\n📖 详见教材第${relevant.page_start}页`;
    else answer = `关于「${q}」，请参考第${ch.num}章的内容。您可以在左侧目录中选择具体小节查看原文。`;
  }

  setTimeout(() => {
    msgs.innerHTML += `<div class="qa-msg ai"><div class="bubble">${answer.replace(/\n/g,'<br>')}</div></div>`;
    msgs.scrollTop = msgs.scrollHeight;
  }, 500);
}

function showCitationPanel() {
  switchTab('qa', document.querySelectorAll('.info-tab')[3]);
  const secs = knowledge.sections.filter(s => s.chapter === currentChapter);
  const kps = [];
  secs.forEach(sec => sec.definitions.forEach(d => kps.push({...d, section: sec.section, page: sec.page_start})));
  const msgs = document.getElementById('qa-messages');
  if(msgs) {
    let html = `<div class="qa-msg ai"><div class="bubble"><strong>📜 第${currentChapter}章 引经据典</strong><br><br>`;
    kps.forEach(k => {
      html += `「<strong>${k.term}</strong>」<br>"${k.text.substring(0,60)}..."<br>`;
      html += `📖 ${k.source ? '《'+k.source+'》' : '《软件工程第3版》'} 第${k.page}页<br><br>`;
    });
    html += `</div></div>`;
    msgs.innerHTML = html;
  }
}

// ===== PPT生成 =====
function generatePPT() {
  const ch = knowledge.chapters.find(c=>c.num===currentChapter);
  const secs = knowledge.sections.filter(s=>s.chapter===currentChapter);
  const kps = [];
  secs.forEach(sec => sec.definitions.forEach(d => kps.push({...d, section:sec.section, page:sec.page_start})));
  if(!kps.length) secs.slice(0,5).forEach(sec => kps.push({term:sec.section_title, text:sec.text_preview, section:sec.section, page:sec.page_start}));
  const chRes = extRes.chapters.find(c=>c.chapter===currentChapter);
  const vids = chRes ? chRes.videos.slice(0,3) : [];

  pptSlides = [];
  pptSlides.push({type:'title', title:`第${currentChapter}章 ${ch.title}`, subtitle:`《软件工程第3版》钱乐秋等编著\n备课教师：王老师`});
  pptSlides.push({type:'toc', title:'本章目录', items:secs.map(s=>`${s.section} ${s.section_title}`)});
  pptSlides.push({type:'content', title:'教学目标', items:['知识目标：掌握核心概念','能力目标：解决实际问题','素质目标：培养工程思维']});

  for(let i=0;i<kps.length;i+=3){
    const chunk=kps.slice(i,i+3);
    pptSlides.push({type:'content', title:'核心知识点', items:chunk.map(k=>`${k.term||k.section}：${k.text.substring(0,50)}`)});
    chunk.forEach(k => {
      if(k.text.length>15) pptSlides.push({type:'def', title:`📜 ${k.term||k.section}`, quote:k.text, source:k.source?`《${k.source}》`:`《软件工程第3版》p${k.page}`});
    });
  }

  pptSlides.push({type:'content', title:'教学重难点', items:[`重点：${kps.slice(0,3).map(k=>k.term||k.section).join('、')}`,'难点：概念理解与工程应用']});
  if(vids.length) pptSlides.push({type:'content', title:'参考资料', items:vids.map(v=>`🎬 ${v.title}`)});
  pptSlides.push({type:'end', title:'谢谢！', subtitle:'《软件工程第3版》· 王老师'});

  renderPPT();
  openModal('ppt-modal');
  showToast(`✓ 已生成 ${pptSlides.length} 页课件`);
}

function renderPPT() {
  const c=document.getElementById('ppt-slides');
  let html='';
  pptSlides.forEach((s,i) => {
    html+=`<div class="ppt-slide slide-${s.type}"><div class="slide-num">${i+1}/${pptSlides.length}</div>`;
    if(s.type==='title') html+=`<h1>${s.title}</h1><div class="sub">${s.subtitle.replace(/\n/g,'<br>')}</div>`;
    else if(s.type==='toc'||s.type==='content') html+=`<h2>${s.title}</h2><ul>${s.items.map(it=>`<li>${it}</li>`).join('')}</ul>`;
    else if(s.type==='def') html+=`<h2>${s.title}</h2><div class="quote">"${s.quote}"</div><div class="source">出处：${s.source}</div>`;
    else if(s.type==='end') html+=`<h1>${s.title}</h1><div class="sub">${s.subtitle||''}</div>`;
    html+=`</div>`;
  });
  c.innerHTML=html;
}

function downloadPPT() {
  if(!pptSlides.length){showToast('请先生成');return;}
  const pptx=new PptxGenJS();
  pptx.defineLayout({name:'C',width:13.33,height:7.5}); pptx.layout='C';
  pptSlides.forEach(s => {
    const sl=pptx.addSlide();
    if(s.type==='title'){sl.background={color:'1A73E8'};sl.addText(s.title,{x:.5,y:2.5,w:12,h:1.2,align:'center',fontSize:36,color:'FFFFFF'});sl.addText(s.subtitle||'',{x:.5,y:4,w:12,h:1,align:'center',fontSize:16,color:'D2E3FC'});}
    else if(s.type==='toc'||s.type==='content'){sl.addText(s.title,{x:.5,y:.3,w:12,h:.8,fontSize:28,color:'1A73E8',bold:true,underline:{color:'1A73E8'}});s.items.forEach((it,i)=>sl.addText(`• ${it}`,{x:.8,y:1.4+i*.7,w:11.5,h:.6,fontSize:14,color:'3C4043',valign:'top'}));}
    else if(s.type==='def'){sl.background={color:'FEF7E0'};sl.addText(s.title,{x:.5,y:.3,w:12,h:.8,fontSize:22,color:'B06000',bold:true});sl.addText(`"${s.quote}"`,{x:1,y:1.8,w:11,h:3,fontSize:18,color:'202124',italic:true,valign:'middle'});sl.addText(`出处：${s.source}`,{x:1,y:5.5,w:11,h:.5,fontSize:12,color:'B06000'});}
    else if(s.type==='end'){sl.background={color:'1A73E8'};sl.addText(s.title,{x:.5,y:3,w:12,h:1,align:'center',fontSize:36,color:'FFFFFF'});sl.addText(s.subtitle||'',{x:.5,y:4.2,w:12,h:.6,align:'center',fontSize:14,color:'D2E3FC'});}
  });
  pptx.writeFile({fileName:`软件工程_第${currentChapter}章_课件.pptx`});
  showToast('✓ PPT已下载！');
}

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数智教材平台 - 登录</title>
<link rel="stylesheet" href="style.css">
<style>
  body { overflow: hidden; background: linear-gradient(135deg, #0F172A 0%, #1E293B 50%, #3b6cb5 100%); }
  .login-bg {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 30% 20%, rgba(59,108,181,.15), transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(164,66,244,.1), transparent 50%);
  }
  .login-container {
    position: relative; z-index: 1;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px;
  }
  .login-logo {
    width: 64px; height: 64px; background: #fff; color: var(--primary);
    border-radius: 16px; display: grid; place-items: center;
    font-size: 28px; font-weight: 700; margin-bottom: 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,.3);
  }
  .login-title {
    font-size: 28px; font-weight: 500; color: #fff;
    margin-bottom: 8px; letter-spacing: 2px;
  }
  .login-book {
    font-size: 15px; color: rgba(255,255,255,.7); margin-bottom: 40px;
  }
  .login-box {
    width: 360px; background: rgba(255,255,255,.08);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 20px; padding: 36px 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,.3);
  }
  .login-box h2 {
    font-size: 20px; font-weight: 500; color: #fff;
    text-align: center; margin-bottom: 28px;
  }
  .login-box .field {
    margin-bottom: 20px;
  }
  .login-box .field label {
    display: block; font-size: 12px; color: rgba(255,255,255,.6);
    margin-bottom: 6px;
  }
  .login-box .input-wrap {
    position: relative;
  }
  .login-box .input-wrap .ico {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: rgba(255,255,255,.4); font-size: 16px;
  }
  .login-box .input {
    width: 100%; padding: 12px 12px 12px 40px;
    background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
    border-radius: 10px; color: #fff; font-size: 14px; outline: none;
    transition: .15s;
  }
  .login-box .input:focus {
    border-color: var(--primary); background: rgba(59,108,181,.1);
    box-shadow: 0 0 0 3px rgba(59,108,181,.15);
  }
  .login-box .input::placeholder { color: rgba(255,255,255,.3); }
  .login-box .remember {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: rgba(255,255,255,.6); margin-bottom: 24px;
    cursor: pointer;
  }
  .login-box .remember input {
    width: 16px; height: 16px; accent-color: var(--primary);
  }
  .login-box .btn-login {
    width: 100%; padding: 12px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #fff; border: none; border-radius: 10px;
    font-size: 15px; font-weight: 500; cursor: pointer;
    transition: .15s; box-shadow: 0 4px 16px rgba(59,108,181,.3);
  }
  .login-box .btn-login:hover {
    transform: translateY(-1px); box-shadow: 0 6px 24px rgba(59,108,181,.4);
  }
  .login-box .links {
    display: flex; justify-content: space-between;
    margin-top: 20px; font-size: 12px;
  }
  .login-box .links a { color: rgba(255,255,255,.5); text-decoration: none; }
  .login-box .links a:hover { color: rgba(255,255,255,.8); }
  .login-footer {
    margin-top: 32px; text-align: center;
    font-size: 12px; color: rgba(255,255,255,.3);
  }
  .demo-hint {
    margin-top: 16px; padding: 10px 14px;
    background: rgba(255,255,255,.05); border-radius: 8px;
    font-size: 11px; color: rgba(255,255,255,.5); text-align: center;
  }
</style>
</head>
<body>
<div class="login-bg"></div>

<div class="login-container">
  <div class="login-logo">数</div>
  <div class="login-title">数智教材平台</div>
  <div class="login-book">《软件工程 第3版》· 引经据典智能备课</div>

  <div class="login-box">
    <h2>欢迎登录</h2>
    <div class="field">
      <label>账号</label>
      <div class="input-wrap">
        <span class="ico">👤</span>
        <input class="input" type="text" id="username" placeholder="请输入账号" value="teacher">
      </div>
    </div>
    <div class="field">
      <label>密码</label>
      <div class="input-wrap">
        <span class="ico">🔒</span>
        <input class="input" type="password" id="password" placeholder="请输入密码" value="123456">
      </div>
    </div>
    <label class="remember">
      <input type="checkbox" checked> 记住密码
    </label>
    <button class="btn-login" onclick="doLogin()">登 录</button>
    <div class="links">
      <a href="#" onclick="showToast('注册功能开发中');return false">注册账号</a>
      <a href="#" onclick="showToast('请联系管理员重置密码');return false">忘记密码？</a>
    </div>
    <div class="demo-hint">
      演示账号：teacher / 123456
    </div>
  </div>

  <div class="login-footer">
    复旦大学公共绩效与信息化研究中心 · 知识工场
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
function doLogin() {
  const u = document.getElementById('username').value;
  const p = document.getElementById('password').value;
  if(!u || !p) { showToast('请输入账号和密码'); return; }
  // 演示：直接登录
  showToast('✓ 登录成功，正在进入...');
  setTimeout(() => location.href = 'teaching.html', 800);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// 回车登录
document.getElementById('password').addEventListener('keydown', e => {
  if(e.key === 'Enter') doLogin();
});
</script>
</body>
</html>

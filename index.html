<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数智教材平台</title>
<link rel="stylesheet" href="style.css">
<style>
  html, body { height: 100%; overflow: hidden; }
  body {
    background: linear-gradient(135deg, var(--bg-soft) 0%, var(--bg) 50%, var(--primary-light) 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font);
  }
  .redirect-wrap { text-align: center; }
  .logo-mark {
    width: 72px; height: 72px; margin: 0 auto 24px;
    background: var(--primary); color: #fff;
    border-radius: 18px; display: grid; place-items: center;
    font-size: 32px; font-weight: 700;
    box-shadow: 0 8px 24px rgba(59,108,181,.25);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }
  .title {
    font-size: 22px; font-weight: 600; color: var(--text);
    margin-bottom: 8px;
  }
  .hint {
    font-size: 14px; color: var(--text-muted);
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .spinner {
    width: 14px; height: 14px; border-radius: 50%;
    border: 2px solid var(--primary-soft); border-top-color: var(--primary);
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="redirect-wrap">
  <div class="logo-mark">数</div>
  <div class="title">正在进入数智教材平台...</div>
  <div class="hint"><span class="spinner"></span><span>加载中</span></div>
</div>
<script>
  // 立即跳转到 teaching.html（系统首页/仪表盘）
  setTimeout(function(){ location.replace('teaching.html'); }, 300);
</script>
</body>
</html>

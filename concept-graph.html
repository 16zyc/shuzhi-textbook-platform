<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>概念图谱 - 软件工程</title>
<link rel="stylesheet" href="style.css">
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  body { overflow: hidden; font-family: 'Noto Sans SC', -apple-system, sans-serif; background: var(--bg); margin: 0; }

  /* === 系统级布局 === */
  .app-layout {
    display: flex; height: 100vh; overflow: hidden;
  }
  .app-sidebar {
    width: 220px; flex-shrink: 0; background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    transition: width .25s;
  }
  .app-sidebar.collapsed { width: 60px; }
  .app-sidebar .sb-head {
    height: 60px; padding: 0 16px; display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border-soft); flex-shrink: 0;
  }
  .app-sidebar .sb-head .logo-mark {
    width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
    background: var(--primary); color: #fff;
    display: grid; place-items: center; font-size: 15px; font-weight: 700;
  }
  .app-sidebar .sb-head .logo-text {
    font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3;
    white-space: nowrap; overflow: hidden;
  }
  .app-sidebar .sb-head .logo-text .sub { font-size: 10px; color: var(--text-muted); font-weight: 400; }
  .app-sidebar.collapsed .logo-text { display: none; }

  .app-sidebar .sb-nav { flex: 1; padding: 8px; overflow-y: auto; }
  .sb-nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 8px; margin-bottom: 2px;
    font-size: 13px; color: var(--text-soft); cursor: pointer;
    transition: .15s; white-space: nowrap; overflow: hidden;
  }
  .sb-nav-item:hover { background: var(--bg-hover); color: var(--text); }
  .sb-nav-item.active { background: var(--primary); color: #fff; }
  .sb-nav-item .ico { width: 20px; flex-shrink: 0; text-align: center; font-size: 16px; }
  .app-sidebar.collapsed .sb-nav-item .lbl { display: none; }
  .sb-nav-section {
    font-size: 10px; font-weight: 600; color: var(--text-muted);
    letter-spacing: 1px; padding: 12px 12px 4px; text-transform: uppercase;
  }
  .app-sidebar.collapsed .sb-nav-section { display: none; }

  .app-sidebar .sb-foot {
    border-top: 1px solid var(--border-soft); padding: 8px; flex-shrink: 0;
  }
  .sb-user {
    padding: 8px 10px; border-radius: 8px; background: var(--bg-soft); margin-bottom: 6px;
    display: flex; align-items: center; gap: 8px;
  }
  .sb-user .av {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
    background: var(--primary-light); color: var(--primary);
    display: grid; place-items: center; font-size: 12px; font-weight: 600;
  }
  .sb-user .info { font-size: 12px; overflow: hidden; }
  .sb-user .info .name { color: var(--text); font-weight: 500; }
  .sb-user .info .role { font-size: 10px; color: var(--text-muted); }
  .app-sidebar.collapsed .sb-user .info { display: none; }
  .sb-collapse-btn {
    width: 100%; height: 32px; border-radius: 8px;
    background: var(--bg-soft); color: var(--text-muted);
    display: grid; place-items: center; cursor: pointer; transition: .15s;
    border: none; font-size: 14px;
  }
  .sb-collapse-btn:hover { background: var(--bg-hover); color: var(--text); }

  /* === 主内容区 === */
  .app-main { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-width: 0; }

  /* === 工作台顶部工具条 === */
  .workspace-toolbar {
    height: 48px; padding: 0 20px; border-bottom: 1px solid var(--border-soft);
    display: flex; align-items: center; gap: 12px; background: var(--surface);
    flex-shrink: 0;
  }
  .workspace-toolbar .ws-title { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; }

  /* === 图谱区 === */
  .graph-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .graph-toolbar { padding: 10px 20px; border-bottom: 1px solid var(--border-soft); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .graph-toolbar .chapter-select { display: flex; gap: 4px; flex-wrap: wrap; }
  .graph-toolbar .chapter-select .chip {
    padding: 4px 10px; border-radius: var(--radius-full); font-size: 11px;
    background: var(--bg-hover); color: var(--text-soft); cursor: pointer; transition: .12s;
  }
  .graph-toolbar .chapter-select .chip:hover { background: var(--primary-light); color: var(--primary); }
  .graph-toolbar .chapter-select .chip.active { background: var(--primary); color: #fff; }
  .graph-toolbar .controls { margin-left: auto; display: flex; gap: 6px; }
  .graph-toolbar .controls button {
    padding: 5px 12px; border-radius: var(--radius); font-size: 12px;
    border: 1px solid var(--border); background: var(--surface); color: var(--text-soft); transition: .15s;
  }
  .graph-toolbar .controls button:hover { background: var(--bg-hover); }
  .graph-canvas { flex: 1; position: relative; background: var(--bg); }
  .graph-canvas svg { width: 100%; height: 100%; }
  .graph-legend {
    position: absolute; bottom: 16px; left: 16px;
    background: var(--surface); border: 1px solid var(--border-soft);
    border-radius: var(--radius); padding: 10px 14px; box-shadow: var(--shadow);
    font-size: 12px;
  }
  .graph-legend .item { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .graph-legend .item:last-child { margin-bottom: 0; }
  .graph-legend .dot { width: 10px; height: 10px; border-radius: 50%; }
  .node-info {
    position: absolute; top: 16px; right: 16px; width: 260px;
    background: var(--surface); border: 1px solid var(--border-soft);
    border-radius: var(--radius-lg); padding: 16px; box-shadow: var(--shadow-lg);
    display: none;
  }
  .node-info.show { display: block; }
  .node-info h4 { font-size: 14px; font-weight: 500; margin-bottom: 8px; }
  .node-info .type-badge { font-size: 11px; padding: 2px 8px; border-radius: var(--radius-full); margin-bottom: 8px; display: inline-block; }
  .node-info .meta { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
  .node-info .text { font-size: 13px; color: var(--text-soft); line-height: 1.6; }
</style>
</head>
<body>

<div class="app-layout">
  <!-- 左侧导航栏 -->
  <aside class="app-sidebar" id="app-sidebar">
    <div class="sb-head">
      <div class="logo-mark">数</div>
      <div class="logo-text">数智教材平台<span class="sub"><br>备课 · 引经据典 · 课件</span></div>
    </div>
    <nav class="sb-nav">
      <div class="sb-nav-section">主导航</div>
      <div class="sb-nav-item" onclick="location.href='teaching.html'">
        <span class="ico">📊</span><span class="lbl">仪表盘</span>
      </div>
      <div class="sb-nav-item" onclick="location.href='teaching.html'">
        <span class="ico">📚</span><span class="lbl">备课工作台</span>
      </div>
      <div class="sb-nav-item" onclick="showToast('教材库开发中')">
        <span class="ico">📖</span><span class="lbl">教材库</span>
      </div>
      <div class="sb-nav-item active">
        <span class="ico">🕸</span><span class="lbl">概念图谱</span>
      </div>
      <div class="sb-nav-item" onclick="window.open('reader.html','_blank')">
        <span class="ico">📄</span><span class="lbl">电子书阅读</span>
      </div>

      <div class="sb-nav-section">资源中心</div>
      <div class="sb-nav-item" onclick="showToast('我的教案开发中')">
        <span class="ico">📝</span><span class="lbl">我的教案</span>
      </div>
      <div class="sb-nav-item" onclick="showToast('课件管理开发中')">
        <span class="ico">📊</span><span class="lbl">课件管理</span>
      </div>
      <div class="sb-nav-item" onclick="showToast('外部资源开发中')">
        <span class="ico">🔗</span><span class="lbl">外部资源</span>
      </div>

      <div class="sb-nav-section">系统</div>
      <div class="sb-nav-item" onclick="showToast('系统设置开发中')">
        <span class="ico">⚙️</span><span class="lbl">系统设置</span>
      </div>
      <div class="sb-nav-item" onclick="location.href='login.html'">
        <span class="ico">🚪</span><span class="lbl">退出登录</span>
      </div>
    </nav>
    <div class="sb-foot">
      <div class="sb-user">
        <div class="av">王</div>
        <div class="info">
          <div class="name">王老师</div>
          <div class="role">教师账号</div>
        </div>
      </div>
      <button class="sb-collapse-btn" onclick="toggleSidebar()">‹</button>
    </div>
  </aside>

  <!-- 主内容区 -->
  <main class="app-main">
    <div class="workspace-toolbar">
      <div class="ws-title">概念图谱 · 软件工程</div>
    </div>

    <div class="graph-area">
      <div class="graph-toolbar">
        <div class="chapter-select" id="chapter-select"></div>
        <div class="controls">
          <button onclick="filterGraph('all')">全部节点</button>
          <button onclick="filterGraph('chapter')">仅章节</button>
          <button onclick="filterGraph('concept')">仅概念</button>
          <button onclick="resetZoom()">重置视图</button>
        </div>
      </div>
      <div class="graph-canvas">
        <svg id="graph-svg"></svg>
        <div class="graph-legend">
          <div class="item"><span class="dot" style="background:#3b6cb5"></span>章</div>
          <div class="item"><span class="dot" style="background:#188038"></span>节</div>
          <div class="item"><span class="dot" style="background:#B06000"></span>概念</div>
        </div>
        <div class="node-info" id="node-info"></div>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
let graphData = null;
let currentChapter = 0; // 0 = 全部
let simulation = null;

async function loadData() {
  const res = await fetch('data/se_graph.json');
  graphData = await res.json();
  renderChapterSelect();
  renderGraph();
}

function renderChapterSelect() {
  const container = document.getElementById('chapter-select');
  let html = `<div class="chip ${currentChapter===0?'active':''}" onclick="selectChapter(0)">全部</div>`;
  const chapters = [...new Set(graphData.nodes.filter(n => n.type === 'chapter').map(n => n.chapter))].sort((a,b)=>a-b);
  chapters.forEach(ch => {
    const chNode = graphData.nodes.find(n => n.type === 'chapter' && n.chapter === ch);
    html += `<div class="chip ${currentChapter===ch?'active':''}" onclick="selectChapter(${ch})">第${ch}章 ${chNode ? chNode.label : ''}</div>`;
  });
  container.innerHTML = html;
}

function selectChapter(num) {
  currentChapter = num;
  renderChapterSelect();
  renderGraph();
}

let filterMode = 'all';
function filterGraph(mode) {
  filterMode = mode;
  renderGraph();
}

function renderGraph() {
  const svg = d3.select('#graph-svg');
  svg.selectAll('*').remove();

  const width = document.querySelector('.graph-canvas').clientWidth;
  const height = document.querySelector('.graph-canvas').clientHeight;

  // 过滤节点
  let nodes = graphData.nodes;
  let links = graphData.links;

  if(currentChapter > 0) {
    const chIds = new Set();
    nodes.forEach(n => {
      if(n.type === 'chapter' && n.chapter === currentChapter) chIds.add(n.id);
      if(n.type === 'section' && n.chapter === currentChapter) chIds.add(n.id);
    });
    // 关联概念
    links.forEach(l => {
      if(chIds.has(l.source)) chIds.add(l.target);
      if(chIds.has(l.target)) chIds.add(l.source);
    });
    nodes = nodes.filter(n => chIds.has(n.id));
    links = links.filter(l => chIds.has(l.source) && chIds.has(l.target));
  }

  if(filterMode === 'chapter') {
    nodes = nodes.filter(n => n.type === 'chapter' || n.type === 'section');
    links = links.filter(l => l.type === 'contains');
  } else if(filterMode === 'concept') {
    const conceptIds = new Set(nodes.filter(n => n.type === 'concept').map(n => n.id));
    nodes = nodes.filter(n => n.type === 'concept');
    links = links.filter(l => conceptIds.has(l.source) && conceptIds.has(l.target));
  }

  // 限制节点数量
  if(nodes.length > 150) {
    nodes = nodes.slice(0, 150);
    const nodeIds = new Set(nodes.map(n => n.id));
    links = links.filter(l => nodeIds.has(l.source) && nodeIds.has(l.target));
  }

  nodes = nodes.map(n => ({...n}));
  links = links.map(l => ({...l}));

  const colorMap = { chapter: '#3b6cb5', section: '#188038', concept: '#B06000' };
  const sizeMap = { chapter: 12, section: 8, concept: 4 };

  const g = svg.append('g');
  const zoom = d3.zoom().scaleExtent([0.2, 4]).on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoom);

  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(d => d.type === 'contains' ? 50 : 70))
    .force('charge', d3.forceManyBody().strength(d => d.type === 'chapter' ? -200 : -60))
    .force('center', d3.forceCenter(width/2, height/2))
    .force('collision', d3.forceCollide().radius(d => (sizeMap[d.type]||4) + 3));

  const link = g.append('g').selectAll('line')
    .data(links).join('line')
    .attr('stroke', d => d.type === 'contains' ? '#D2E3FC' : '#E8EAED')
    .attr('stroke-width', d => d.type === 'contains' ? 1.5 : 0.8)
    .attr('opacity', 0.6);

  const node = g.append('g').selectAll('g')
    .data(nodes).join('g')
    .attr('cursor', 'pointer')
    .call(d3.drag().on('start', dragStart).on('drag', dragging).on('end', dragEnd));

  node.append('circle')
    .attr('r', d => sizeMap[d.type] || 4)
    .attr('fill', d => colorMap[d.type] || '#BDC1C6')
    .attr('stroke', '#fff')
    .attr('stroke-width', 1.5);

  node.append('text')
    .text(d => d.label.length > 6 ? d.label.slice(0,6)+'…' : d.label)
    .attr('font-size', d => d.type === 'chapter' ? 11 : 9)
    .attr('fill', d => d.type === 'chapter' ? '#202124' : '#5F6368')
    .attr('text-anchor', 'middle')
    .attr('dy', d => (sizeMap[d.type]||4) + 11)
    .attr('pointer-events', 'none');

  node.on('click', (e, d) => showNodeInfo(d));

  simulation.on('tick', () => {
    link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  function dragStart(e, d) { if(!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
  function dragging(e, d) { d.fx = e.x; d.fy = e.y; }
  function dragEnd(e, d) { if(!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }
}

function showNodeInfo(d) {
  const info = document.getElementById('node-info');
  const typeLabel = { chapter: '章', section: '节', concept: '概念' }[d.type] || '';
  const typeColor = { chapter: '#3b6cb5', section: '#188038', concept: '#B06000' }[d.type] || '#BDC1C6';
  let html = `<span class="type-badge" style="background:${typeColor}20;color:${typeColor}">${typeLabel}</span>`;
  html += `<h4>${d.label}</h4>`;
  if(d.full) html += `<div class="meta">${d.full}</div>`;
  if(d.page) html += `<div class="meta">📍 第${d.page}页</div>`;
  if(d.page_count) html += `<div class="meta">出现于 ${d.page_count} 页</div>`;
  if(d.freq) html += `<div class="meta">频次：${d.freq}</div>`;
  html += `<div class="text"><button class="btn btn-sm btn-text" onclick="location.href='teaching.html'">→ 在备课中查看</button></div>`;
  info.innerHTML = html;
  info.classList.add('show');
}

function resetZoom() {
  const svg = d3.select('#graph-svg');
  svg.transition().duration(500).call(d3.zoom().transform, d3.zoomIdentity);
}

// ===== 侧边栏折叠 =====
function toggleSidebar() {
  const sb = document.getElementById('app-sidebar');
  sb.classList.toggle('collapsed');
  const btn = sb.querySelector('.sb-collapse-btn');
  btn.textContent = sb.classList.contains('collapsed') ? '›' : '‹';
}

// ===== 通用 =====
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

window.addEventListener('resize', () => { if(simulation) renderGraph(); });
loadData();
</script>
</body>
</html>

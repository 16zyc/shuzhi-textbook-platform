<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数智教材平台 - 软件工程 第3版</title>
<link rel="stylesheet" href="style.css">
<style>
  body { background: #525659; overflow: hidden; }
  .reader-topbar {
    height: 56px;
    background: linear-gradient(90deg, #1557B0, #1A73E8);
    color: #fff;
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,.25);
    position: relative;
    z-index: 10;
  }
  .reader-topbar .back {
    display: flex; align-items: center; gap: 6px;
    color: rgba(255,255,255,.85);
    padding: 7px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: .2s;
    font-size: 13px;
    text-decoration: none;
  }
  .reader-topbar .back:hover { background: rgba(255,255,255,.12); color: #fff; }
  .reader-topbar .title {
    font-size: 15px; font-weight: 600;
    flex: 1;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .reader-topbar .tools { display: flex; align-items: center; gap: 8px; }
  .reader-topbar .tools button {
    background: rgba(255,255,255,.12);
    color: #fff;
    width: 34px; height: 34px;
    border-radius: 8px;
    display: grid; place-items: center;
    font-size: 15px;
    transition: .15s;
    border: none;
  }
  .reader-topbar .tools button:hover { background: rgba(255,255,255,.22); }
  .reader-topbar .tools .page-input {
    background: rgba(255,255,255,.12);
    border: none;
    color: #fff;
    width: 48px; height: 30px;
    border-radius: 6px;
    text-align: center;
    font-size: 13px;
  }
  .reader-topbar .tools .page-info { font-size: 13px; color: rgba(255,255,255,.85); min-width: 70px; }

  .reader-body {
    display: flex;
    height: calc(100vh - 56px);
  }
  /* 侧边目录 */
  .toc {
    width: 240px;
    background: #2d2d2d;
    color: #ddd;
    overflow-y: auto;
    flex-shrink: 0;
    border-right: 1px solid rgba(0,0,0,.3);
  }
  .toc .toc-head {
    padding: 16px 18px 12px;
    font-size: 12px;
    color: #999;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-bottom: 1px solid rgba(255,255,255,.06);
    position: sticky; top: 0;
    background: #2d2d2d;
    z-index: 1;
  }
  .toc .toc-item {
    padding: 10px 18px;
    font-size: 13px;
    color: #ccc;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: .15s;
    line-height: 1.5;
  }
  .toc .toc-item:hover { background: rgba(255,255,255,.05); color: #fff; }
  .toc .toc-item.active {
    background: rgba(26,115,232,.25);
    color: #fff;
    border-left-color: #1A73E8;
  }
  .toc .toc-item .num { color: #888; margin-right: 8px; font-size: 12px; }

  /* 阅读区 */
  .viewer-wrap {
    flex: 1;
    overflow: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 0;
    background: #525659;
    position: relative;
  }
  #page-img {
    box-shadow: 0 8px 30px rgba(0,0,0,.5);
    background: #fff;
    max-width: 100%;
    transition: opacity .15s;
  }
  #page-img.loading { opacity: .3; }
  .page-placeholder {
    width: 600px; max-width: 90%;
    background: #fff; border-radius: 8px;
    padding: 60px 40px; text-align: center;
    color: #80868B; font-size: 14px;
    box-shadow: 0 8px 30px rgba(0,0,0,.5);
  }
  .page-placeholder .ico { font-size: 48px; margin-bottom: 16px; }

  /* 翻页按钮（浮在阅读区两侧） */
  .nav-btn {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(0,0,0,.4);
    color: #fff;
    display: grid; place-items: center;
    cursor: pointer;
    font-size: 18px;
    transition: .2s;
    z-index: 5;
    user-select: none;
  }
  .nav-btn:hover { background: rgba(26,115,232,.8); }
  .nav-btn.prev { left: 260px; }
  .nav-btn.next { right: 20px; }
  @media (max-width: 700px) {
    .toc { display: none; }
    .nav-btn.prev { left: 12px; }
  }

  /* 加载指示器 */
  .load-indicator {
    position: absolute; top: 12px; right: 12px;
    background: rgba(0,0,0,.6); color: #fff;
    padding: 4px 12px; border-radius: 16px;
    font-size: 12px; display: none;
    z-index: 6;
  }
  .load-indicator.show { display: block; }
  .load-indicator .spin {
    display: inline-block; width: 12px; height: 12px;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff; border-radius: 50%;
    animation: spin .8s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="reader-topbar">
  <a class="back" href="teaching.html">← 返回备课平台</a>
  <div class="title" id="book-title">软件工程 第3版 · 钱乐秋等编著</div>
  <div class="tools">
    <button onclick="zoom(-0.2)" title="缩小">－</button>
    <button onclick="zoom(0.2)" title="放大">＋</button>
    <button onclick="toggleToc()" title="目录">☰</button>
    <input type="number" class="page-input" id="page-input" min="1" max="398" value="14" onchange="goToPage(this.value)">
    <span class="page-info" id="page-info">/ 398</span>
  </div>
</div>

<div class="reader-body">
  <aside class="toc" id="toc">
    <div class="toc-head">📑 目录</div>
    <div id="toc-list">
      <div class="toc-item" onclick="goToPage(1)"><span class="num">封面</span>软件工程 第3版</div>
      <div class="toc-item" onclick="goToPage(3)"><span class="num">前衬</span>版权信息</div>
      <div class="toc-item" onclick="goToPage(5)"><span class="num">前言</span>序言与目录</div>
      <div class="toc-item active" onclick="goToPage(14)"><span class="num">第1章</span>概论</div>
      <div class="toc-item" onclick="goToPage(40)"><span class="num">第2章</span>系统工程</div>
      <div class="toc-item" onclick="goToPage(46)"><span class="num">第3章</span>需求工程</div>
      <div class="toc-item" onclick="goToPage(59)"><span class="num">第4章</span>设计工程</div>
      <div class="toc-item" onclick="goToPage(80)"><span class="num">第5章</span>结构化分析与设计</div>
      <div class="toc-item" onclick="goToPage(123)"><span class="num">第6章</span>面向数据结构的分析与设计</div>
      <div class="toc-item" onclick="goToPage(133)"><span class="num">第7章</span>面向对象方法基础</div>
      <div class="toc-item" onclick="goToPage(150)"><span class="num">第8章</span>面向对象建模</div>
      <div class="toc-item" onclick="goToPage(197)"><span class="num">第9章</span>基于构件的软件开发</div>
      <div class="toc-item" onclick="goToPage(212)"><span class="num">第10章</span>敏捷软件开发</div>
      <div class="toc-item" onclick="goToPage(234)"><span class="num">第11章</span>人机界面设计</div>
      <div class="toc-item" onclick="goToPage(249)"><span class="num">第12章</span>程序设计语言和编码</div>
      <div class="toc-item" onclick="goToPage(260)"><span class="num">第13章</span>软件测试</div>
      <div class="toc-item" onclick="goToPage(294)"><span class="num">第14章</span>Web工程</div>
      <div class="toc-item" onclick="goToPage(310)"><span class="num">第15章</span>软件维护与再工程</div>
      <div class="toc-item" onclick="goToPage(323)"><span class="num">第16章</span>软件项目管理</div>
    </div>
  </aside>

  <div class="viewer-wrap" id="viewer">
    <div class="load-indicator" id="load-ind"><span class="spin"></span>加载中</div>
    <img id="page-img" src="" alt="页面" style="display:none">
    <div class="page-placeholder" id="placeholder" style="display:none">
      <div class="ico">📄</div>
      <div>该页图片暂未提取</div>
      <div style="font-size:12px;margin-top:8px;color:#BDC1C6">第 <span id="ph-num"></span> 页</div>
    </div>
  </div>
</div>

<div class="nav-btn prev" onclick="prevPage()" title="上一页">‹</div>
<div class="nav-btn next" onclick="nextPage()" title="下一页">›</div>

<script>
// 图片总页数（已提取的页面图片），PDF 实际 398 页
const TOTAL_PAGES = 398;
const IMG_PAGES = 388;  // 图片提取到第 388 页

let pageNum = 14;
let scale = 1;
const img = document.getElementById('page-img');
const placeholder = document.getElementById('placeholder');
const loadInd = document.getElementById('load-ind');

// 从 URL 参数读取起始页
const params = new URLSearchParams(location.search);
const startPage = parseInt(params.get('page')) || 14;
pageNum = Math.min(Math.max(1, startPage), TOTAL_PAGES);

// 生成图片路径：页码 → p0XX_0.jpeg
function pageToImgSrc(n) {
  return `images/se/p${String(n).padStart(3,'0')}_0.jpeg`;
}

// 渲染指定页
function renderPage(num) {
  document.getElementById('page-input').value = num;
  document.getElementById('page-info').textContent = `/ ${TOTAL_PAGES}`;

  // 高亮目录
  document.querySelectorAll('.toc-item').forEach(it => it.classList.remove('active'));

  if (num > IMG_PAGES) {
    // 超出图片范围，显示占位
    img.style.display = 'none';
    placeholder.style.display = 'block';
    document.getElementById('ph-num').textContent = num;
    loadInd.classList.remove('show');
    return;
  }

  placeholder.style.display = 'none';
  img.style.display = 'block';
  img.classList.add('loading');
  loadInd.classList.add('show');

  // 设置缩放（通过 CSS transform）
  img.style.transform = scale !== 1 ? `scale(${scale})` : '';
  img.style.transformOrigin = 'top center';

  // 加载图片
  const newSrc = pageToImgSrc(num);
  if (img.src.indexOf(newSrc) === -1) {
    img.onload = function() {
      img.classList.remove('loading');
      loadInd.classList.remove('show');
      // 预加载下一页
      preload(num + 1);
    };
    img.onerror = function() {
      img.style.display = 'none';
      placeholder.style.display = 'block';
      document.getElementById('ph-num').textContent = num;
      loadInd.classList.remove('show');
    };
    img.src = newSrc;
  } else {
    img.classList.remove('loading');
    loadInd.classList.remove('show');
  }
}

// 预加载下一页图片（提升翻页体验）
function preload(num) {
  if (num > IMG_PAGES || num < 1) return;
  const preImg = new Image();
  preImg.src = pageToImgSrc(num);
}

function prevPage() {
  if (pageNum <= 1) return;
  pageNum--;
  renderPage(pageNum);
}
function nextPage() {
  if (pageNum >= TOTAL_PAGES) return;
  pageNum++;
  renderPage(pageNum);
}
function goToPage(n) {
  n = parseInt(n);
  if (isNaN(n) || n < 1) n = 1;
  if (n > TOTAL_PAGES) n = TOTAL_PAGES;
  pageNum = n;
  renderPage(n);
}
function zoom(delta) {
  scale = Math.max(0.5, Math.min(2.5, scale + delta));
  img.style.transform = scale !== 1 ? `scale(${scale})` : '';
  img.style.transformOrigin = 'top center';
}
function toggleToc() {
  const t = document.getElementById('toc');
  t.style.display = (t.style.display === 'none') ? 'block' : 'none';
}

// 键盘翻页
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' || e.key === 'PageUp') prevPage();
  if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') { e.preventDefault(); nextPage(); }
});

// 初始渲染（图片秒开，无需等待）
renderPage(pageNum);
</script>
</body>
</html>
